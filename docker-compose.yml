services:
  mariadb:
    image: mariadb:11.4
    container_name: adcdb-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: adcdb_root
      MARIADB_DATABASE: adcdb
      MARIADB_USER: adcdb
      MARIADB_PASSWORD: adcdb_pass
    volumes:
      - adcdb-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  adcdb-mariadb-data:
